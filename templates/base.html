<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Budget Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="navbar">
    <a href="{{ url_for('dashboard') }}" class="navbar-brand">Budget Tracker</a>
    <nav class="navbar-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('transactions') }}">Transactions</a>
      <a href="{{ url_for('budgets') }}">Budgets</a>
    </nav>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>&copy; 2026 Budget Tracker · CSCI 3308</p>
  </footer>

</body>
</html>
